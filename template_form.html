<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Baru - Form</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pt-8 pb-10 px-4 flex items-center justify-center">
    <!-- Container Utama Form -->
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden p-6 relative">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl font-bold mx-auto shadow-lg mb-4">
                🚀
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Judul Halaman</h1>
            <p class="text-sm text-slate-500 mt-1">Deskripsi singkat halaman form Anda.</p>
        </div>

        <form action="#" method="POST">
            <div class="mb-5">
                <label class="block text-sm font-bold text-slate-700 mb-2">Input Teks 1</label>
                <input type="text" required placeholder="Ketik sesuatu..."
                    class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-lg rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 min-h-[50px] font-semibold">
            </div>
            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-2">Input Teks 2</label>
                <input type="text" required placeholder="Ketik sesuatu..."
                    class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-lg rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 min-h-[50px] font-semibold">
            </div>
            <button type="submit"
                class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-bold rounded-xl text-lg px-5 py-4 text-center shadow-lg transition-all active:scale-[0.98]">
                Submit Form
            </button>
        </form>
    </div>
</body>
</html>
